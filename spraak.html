<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexi Spraak</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
        }

        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-app {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-full {
            max-width: 200px;
            max-height: 60px;
            object-fit: contain;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.bot .bubble {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .status-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            transition: 0.3s;
        }

        .status-dot.listening {
            background: #22c55e;
            animation: pulse 1.5s infinite;
        }

        .status-dot.speaking {
            background: #3b82f6;
            animation: pulse 1s infinite;
        }

        .status-dot.thinking {
            background: #f59e0b;
            animation: pulse 0.8s infinite;
        }

        .status-text {
            font-weight: 500;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0f172a;
            }
            .chat-app {
                background: #1e293b;
            }
            .chat-header {
                background: #1e293b;
                border-bottom-color: #334155;
            }
            .messages-area {
                background: #0f172a;
            }
            .message.bot .bubble {
                background: #1e293b;
                color: #f1f5f9;
                border-color: #334155;
            }
            .status-bar {
                background: #1e293b;
                border-top-color: #334155;
            }
            .status-indicator {
                color: #94a3b8;
            }
        }
    </style>
</head>
<body>
    <div class="chat-app">
        <div class="chat-header">
            <img src="NexiSpraak.png" alt="Nexi Spraak" class="header-logo-full" onerror="this.src='jimisdebest.github.io/nexi/NexiSpraak.png'">
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Starten...</span>
            </div>
        </div>
    </div>

    <script>
        const messagesArea = document.getElementById('messagesArea');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let qaDatabase = [];
        let recognition = null;
        let isListening = false;
        let isSpeaking = false;
        let isProcessing = false;

        // Laad reacties
        async function loadReacties() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/jimisdebest/nexi/main/reacties.txt');
                if (!response.ok) throw new Error('reacties niet gevonden');
                const text = await response.text();
                const lines = text.split('\n');
                for (let line of lines) {
                    line = line.trim();
                    if (line.includes('=')) {
                        let [vraag, antwoord] = line.split('=').map(part => part.trim());
                        if (vraag && antwoord) {
                            qaDatabase.push({
                                vraag: vraag.toLowerCase(),
                                antwoord: antwoord
                            });
                        }
                    }
                }
                console.log(`✅ ${qaDatabase.length} reacties geladen`);
            } catch (err) {
                console.warn('Kan reacties.txt niet laden', err);
            }
        }

        // Zoek beste match met minimaal 60% overeenkomst
        function findBestMatch(userMessage) {
            const lowerMsg = userMessage.toLowerCase().trim();
            let bestMatch = null;
            let bestScore = 0;

            for (let item of qaDatabase) {
                const lowerVraag = item.vraag;
                
                if (lowerMsg === lowerVraag) {
                    return { match: item, score: 1.0 };
                }
                
                const userWords = lowerMsg.split(/\s+/).filter(w => w.length > 1);
                const vraagWords = lowerVraag.split(/\s+/).filter(w => w.length > 1);
                
                if (userWords.length === 0 || vraagWords.length === 0) continue;
                
                let matches = 0;
                
                for (let uw of userWords) {
                    for (let vw of vraagWords) {
                        if (uw === vw) {
                            matches++;
                            break;
                        } else if (vw.includes(uw) || uw.includes(vw)) {
                            matches += 0.5;
                            break;
                        }
                    }
                }
                
                const score = matches / Math.max(userWords.length, vraagWords.length);
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = item;
                }
            }

            return { match: bestMatch, score: bestScore };
        }

        // Update status
        function updateStatus(state) {
            statusDot.className = 'status-dot';
            switch(state) {
                case 'listening':
                    statusDot.classList.add('listening');
                    statusText.textContent = '🟢 Aan het luisteren...';
                    break;
                case 'thinking':
                    statusDot.classList.add('thinking');
                    statusText.textContent = '🟡 Aan het denken...';
                    break;
                case 'speaking':
                    statusDot.classList.add('speaking');
                    statusText.textContent = '🔵 Aan het praten...';
                    break;
                case 'idle':
                    statusText.textContent = '⏳ Even wachten...';
                    break;
                case 'error':
                    statusText.textContent = '🔴 Fout - probeer opnieuw';
                    break;
            }
        }

        // Spraakherkenning - continu modus
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                updateStatus('error');
                statusText.textContent = '❌ Spraakherkenning niet ondersteund';
                addMessage('⚠️ Spraakherkenning wordt niet ondersteund in jouw browser. Probeer Chrome of Edge.', 'bot');
                return null;
            }

            const rec = new SpeechRecognition();
            rec.lang = 'nl-NL';
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            rec.continuous = true; // Blijft luisteren

            rec.onstart = () => {
                isListening = true;
                updateStatus('listening');
                console.log('🎤 Begonnen met luisteren...');
            };

            rec.onend = () => {
                console.log('🎤 Luisteren gestopt');
                // Automatisch herstarten als we niet aan het praten of verwerken zijn
                if (!isSpeaking && !isProcessing) {
                    setTimeout(() => {
                        if (!isSpeaking && !isProcessing) {
                            console.log('🔄 Herstarten met luisteren...');
                            rec.start();
                        }
                    }, 500);
                }
            };

            rec.onresult = (event) => {
                const lastResult = event.results[event.results.length - 1];
                if (lastResult.isFinal) {
                    const transcript = lastResult[0].transcript.trim();
                    if (transcript) {
                        console.log(`🗣️ Verstaan: "${transcript}"`);
                        processUserInput(transcript);
                    }
                }
            };

            rec.onerror = (event) => {
                console.error('Spraakherkenning fout:', event.error);
                
                if (event.error === 'no-speech') {
                    // Geen spraak gedetecteerd, dat is oké bij continu luisteren
                    updateStatus('listening');
                } else if (event.error === 'aborted') {
                    // Handmatig gestopt
                    updateStatus('idle');
                } else {
                    updateStatus('error');
                    // Probeer opnieuw na een fout
                    setTimeout(() => {
                        if (!isSpeaking && !isProcessing && !isListening) {
                            try {
                                rec.start();
                            } catch (e) {
                                console.log('Kon niet herstarten:', e);
                            }
                        }
                    }, 2000);
                }
            };

            return rec;
        }

        // Verwerk gebruikersinvoer
        async function processUserInput(message) {
            if (isProcessing || isSpeaking) {
                console.log('⏳ Nog bezig, negeer input:', message);
                return;
            }

            isProcessing = true;
            
            // Stop tijdelijk met luisteren
            if (recognition && isListening) {
                recognition.stop();
                isListening = false;
            }

            // Toon gebruikersbericht
            addMessage(message, 'user');

            // Denk status
            updateStatus('thinking');

            // Simuleer denktijd
            await new Promise(resolve => setTimeout(resolve, 600 + Math.random() * 800));

            // Zoek antwoord
            const result = findBestMatch(message);
            let response;

            if (result.score >= 0.6) {
                response = result.match.antwoord;
                console.log(`✅ Match: ${Math.round(result.score * 100)}% - "${result.match.vraag}"`);
            } else {
                response = "Dat weet ik nog niet. Ik ben momenteel nog hard aan het leren.";
                console.log(`❌ Geen match (${Math.round(result.score * 100)}% onder de 60%)`);
            }

            // Toon bot bericht
            addMessage(response, 'bot');

            // Spreek het antwoord uit
            isProcessing = false;
            await speakResponse(response);

            // Hervat luisteren
            if (!isListening && !isSpeaking) {
                setTimeout(() => {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log('Kon niet herstarten:', e);
                        setTimeout(() => recognition.start(), 500);
                    }
                }, 300);
            }
        }

        // Spreek antwoord uit
        function speakResponse(text) {
            return new Promise((resolve) => {
                const speechSynthesis = window.speechSynthesis;
                
                if (!speechSynthesis) {
                    console.warn('Tekst naar spraak niet ondersteund');
                    updateStatus('listening');
                    resolve();
                    return;
                }

                // Verwijder HTML tags
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = text;
                const cleanText = tempDiv.textContent || tempDiv.innerText || text;

                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'nl-NL';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                // Probeer Nederlandse stem
                const voices = speechSynthesis.getVoices();
                const dutchVoice = voices.find(voice => voice.lang.startsWith('nl'));
                if (dutchVoice) {
                    utterance.voice = dutchVoice;
                }

                utterance.onstart = () => {
                    isSpeaking = true;
                    updateStatus('speaking');
                };

                utterance.onend = () => {
                    isSpeaking = false;
                    updateStatus('listening');
                    resolve();
                };

                utterance.onerror = (e) => {
                    console.error('Spraakfout:', e);
                    isSpeaking = false;
                    updateStatus('listening');
                    resolve();
                };

                speechSynthesis.speak(utterance);
            });
        }

        // Toon bericht
        function addMessage(text, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${type}`;
            
            const avatarImg = type === 'bot' ? 'logo.png' : 'mens.png';
            const avatarFallback = type === 'bot' ? 'jimisdebest.github.io/nexi/logo.png' : 'jimisdebest.github.io/nexi/mens.png';
            
            wrapper.innerHTML = `
                <div class="message-avatar">
                    <img src="${avatarImg}" alt="${type === 'bot' ? 'Nexi' : 'Gebruiker'}" onerror="this.src='${avatarFallback}'">
                </div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            messagesArea.appendChild(wrapper);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Init
        async function init() {
            await loadReacties();
            
            recognition = initSpeechRecognition();
            
            if (recognition) {
                // Start met luisteren
                try {
                    recognition.start();
                    updateStatus('listening');
                    addMessage('Hey! 👋 Ik ben Nexi Spraak. Praat tegen me, ik luister de hele tijd!', 'bot');
                } catch (e) {
                    console.error('Kon niet starten:', e);
                    updateStatus('error');
                    addMessage('⚠️ Klik ergens op de pagina en probeer opnieuw. Spraakherkenning heeft een gebruikersinteractie nodig.', 'bot');
                    
                    // Wacht op klik om te starten
                    document.addEventListener('click', () => {
                        if (!isListening && !isSpeaking) {
                            recognition.start();
                            updateStatus('listening');
                        }
                    }, { once: true });
                }
            }
        }

        init();
    </script>
</body>
</html>
