<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexi</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f7fb;
            --surface: #ffffff;
            --surface-elevated: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-light: #93c5fd;
            --border: #e2e8f0;
            --user-bubble: #3b82f6;
            --user-bubble-text: #ffffff;
            --bot-bubble: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --surface: #1e293b;
                --surface-elevated: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --accent: #60a5fa;
                --accent-dark: #3b82f6;
                --accent-light: #1e3a8a;
                --border: #334155;
                --user-bubble: #3b82f6;
                --user-bubble-text: #ffffff;
                --bot-bubble: #334155;
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            }
        }

        body {
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
        }

        .chat-app {
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            max-height: 900px;
            background: var(--bg-primary);
            border-radius: 32px;
            box-shadow: var(--shadow), 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chat-header {
            background: var(--surface);
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-secondary);
            scroll-behavior: smooth;
        }

        .message-bot {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble-bot {
            background: var(--bot-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            padding: 10px 18px;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            box-shadow: var(--shadow);
        }

        .message-user {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            justify-content: flex-end;
            max-width: 85%;
            align-self: flex-end;
            animation: fadeSlideUp 0.25s ease;
            flex-direction: row-reverse;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble-user {
            background: var(--user-bubble);
            color: var(--user-bubble-text);
            padding: 10px 18px;
            border-radius: 20px;
            border-bottom-right-radius: 6px;
            word-break: break-word;
            box-shadow: var(--shadow);
        }

        .generated-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .generated-image:hover {
            transform: scale(1.01);
        }

        .thinking-bubble {
            background: var(--bot-bubble);
            opacity: 0.7;
            font-style: italic;
        }

        .analysis-message {
            background: var(--surface-elevated);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            animation: fadeSlideUp 0.3s ease;
            max-width: 85%;
        }

        .analysis-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .analysis-step .check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .check.success { background: #22c55e; color: white; }
        .check.error { background: #ef4444; color: white; }
        .check.pending { background: #eab308; color: white; }

        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .plus-btn {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .plus-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .text-input-wrapper {
            flex: 1;
            position: relative;
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .mode-chip {
            background: var(--accent-light);
            color: var(--accent-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.1s;
        }

        .mode-chip .remove {
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.7;
        }

        .mode-chip .remove:hover {
            opacity: 1;
        }

        #messageInput {
            width: 100%;
            padding: 12px 52px 12px 16px;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .send-knop {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .send-knop:hover {
            background: var(--accent-dark);
            transform: translateY(-50%) scale(1.02);
        }

        .plus-menu {
            position: absolute;
            bottom: 90px;
            left: 28px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            min-width: 200px;
            z-index: 200;
            border: 1px solid var(--border);
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: 0.2s ease;
        }

        .plus-menu.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .menu-optie {
            background: transparent;
            border: none;
            padding: 12px 20px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            transition: 0.1s;
        }

        .menu-optie:hover {
            background: var(--bg-secondary);
        }

        .image-error {
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 8px;
            text-align: center;
            background: var(--surface-elevated);
            border-radius: 8px;
            margin-top: 8px;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .message-bot, .message-user {
                max-width: 95%;
            }
            .plus-menu {
                left: 16px;
                bottom: 80px;
            }
            .bot-avatar, .user-avatar {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <h1>Nexi</h1>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="input-bar">
        <button class="plus-btn" id="plusButton">➕</button>
        <div class="text-input-wrapper">
            <div class="chip-container" id="chipContainer"></div>
            <input type="text" id="messageInput" placeholder="Typ je bericht...">
            <button class="send-knop" id="sendButton">➤</button>
        </div>
    </div>

    <div class="plus-menu" id="plusMenu">
        <button class="menu-optie" data-action="toggleImageMode">Afbeeldingen zoeken</button>
        <button class="menu-optie" data-action="toggleAnalysisMode">Analyse tonen</button>
    </div>
</div>

<script>
    // ==================== DATA STRUCTUREN ====================
    let qaDatabase = [];
    let imageDatabase = [];
    let learnedQA = [];
    
    let imageModeActive = false;
    let analysisModeActive = false;
    let currentPlusMenuOpen = false;
    let lastBotMessage = "";
    
    const messagesDiv = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendButton');
    const plusBtn = document.getElementById('plusButton');
    const plusMenu = document.getElementById('plusMenu');
    const chipContainer = document.getElementById('chipContainer');
    
    // Voorbeeld data voor als de bestanden niet laden
    const defaultImages = [
        { keyword: "brug", url: "https://picsum.photos/id/104/400/300" },
        { keyword: "mens", url: "https://picsum.photos/id/64/400/300" },
        { keyword: "natuur", url: "https://picsum.photos/id/15/400/300" },
        { keyword: "stad", url: "https://picsum.photos/id/104/400/300" },
        { keyword: "auto", url: "https://picsum.photos/id/107/400/300" }
    ];
    
    const defaultQA = [
        { vraag: "hallo", antwoord: "Hallo! Hoe kan ik je helpen?", containsHtml: false, bron: "default" },
        { vraag: "hoi", antwoord: "Hoi! Leuk dat je er bent!", containsHtml: false, bron: "default" },
        { vraag: "hoe gaat het", antwoord: "Goed hoor! En met jou?", containsHtml: false, bron: "default" }
    ];
    
    // ==================== DATA LADEN ====================
    async function loadReacties() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/jimisdebest/nexi/main/reacties.txt');
            if (response.ok) {
                const text = await response.text();
                const lines = text.split('\n');
                for (let line of lines) {
                    line = line.trim();
                    if (line.includes('=')) {
                        let [vraag, antwoord] = line.split('=').map(part => part.trim());
                        if (vraag && antwoord) {
                            qaDatabase.push({
                                vraag: vraag.toLowerCase(),
                                antwoord: antwoord,
                                containsHtml: antwoord.includes('<img') || antwoord.includes('<br'),
                                bron: 'reacties.txt'
                            });
                        }
                    }
                }
                console.log(`✅ Geladen: ${qaDatabase.length} reacties uit reacties.txt`);
            } else {
                console.log('Gebruik standaard reacties');
                qaDatabase.push(...defaultQA);
            }
        } catch (err) {
            console.warn('Kan reacties.txt niet laden, gebruik standaard', err);
            qaDatabase.push(...defaultQA);
        }
    }
    
    async function loadPlaatjes() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/Jimisdebest/nexi/main/plaatjes.txt');
            if (response.ok) {
                const text = await response.text();
                const lines = text.split('\n');
                for (let line of lines) {
                    line = line.trim();
                    if (line.includes('=')) {
                        let [keyword, url] = line.split('=').map(part => part.trim());
                        if (keyword && url && (url.startsWith('http') || url.startsWith('https'))) {
                            imageDatabase.push({ 
                                keyword: keyword.toLowerCase(), 
                                url: url 
                            });
                        }
                    }
                }
                console.log(`✅ Geladen: ${imageDatabase.length} afbeeldingen uit plaatjes.txt`);
            } else {
                console.log('Gebruik standaard afbeeldingen');
                imageDatabase.push(...defaultImages);
            }
        } catch (err) {
            console.warn('Kan plaatjes.txt niet laden, gebruik standaard', err);
            imageDatabase.push(...defaultImages);
        }
        
        // Toon wat er geladen is voor debugging
        console.log('Afbeeldingen database:', imageDatabase);
    }
    
    function loadLearnedFromStorage() {
        const stored = localStorage.getItem('nexi_learned_qa');
        if (stored) {
            learnedQA = JSON.parse(stored);
            console.log(`Geladen uit localStorage: ${learnedQA.length} geleerde reacties`);
        }
    }
    
    function saveLearnedToStorage() {
        localStorage.setItem('nexi_learned_qa', JSON.stringify(learnedQA));
    }
    
    // ==================== MATCHING FUNCTIES ====================
    function findBestImageMatch(userMessage) {
        if (imageDatabase.length === 0) {
            console.log('Geen afbeeldingen in database');
            return null;
        }
        
        const lowerMsg = userMessage.toLowerCase();
        let bestMatch = null;
        let bestScore = 0;
        
        for (let img of imageDatabase) {
            const keyword = img.keyword;
            let score = 0;
            
            // Exact match
            if (lowerMsg === keyword) {
                score = 1.0;
            }
            // Keyword komt voor in bericht
            else if (lowerMsg.includes(keyword)) {
                score = 0.8;
            }
            // Woord voor woord check
            else {
                const userWords = lowerMsg.split(/\s+/);
                const keywordWords = keyword.split(/\s+/);
                
                for (let uw of userWords) {
                    for (let kw of keywordWords) {
                        if (uw === kw) {
                            score += 0.5;
                        } else if (kw.length > 3 && uw.includes(kw) || kw.includes(uw)) {
                            score += 0.3;
                        }
                    }
                }
                score = Math.min(score, 0.7);
            }
            
            // Extra bonus als er expliciet om een afbeelding wordt gevraagd
            if (lowerMsg.includes('afbeelding') || lowerMsg.includes('foto') || lowerMsg.includes('plaatje') || lowerMsg.includes('toon')) {
                score += 0.1;
            }
            
            console.log(`Match voor "${keyword}": score ${score}`);
            
            if (score > bestScore && score > 0.2) {
                bestScore = score;
                bestMatch = img;
            }
        }
        
        if (bestMatch) {
            console.log(`Beste match: ${bestMatch.keyword} met score ${bestScore}`);
        } else {
            console.log('Geen goede match gevonden');
        }
        
        // Als afbeeldingen-modus aan staat en er is een match, toon die
        if (imageModeActive && bestMatch) {
            return bestMatch;
        }
        
        // Anders alleen tonen als score hoog genoeg is
        if (bestMatch && bestScore >= 0.5) {
            return bestMatch;
        }
        
        return null;
    }
    
    function findBestQAMatch(userMessage) {
        const lowerMsg = userMessage.toLowerCase();
        let bestMatch = null;
        let bestScore = 0;
        
        // Zoek in geleerde QA
        for (let item of learnedQA) {
            let score = 0;
            if (lowerMsg === item.vraag) {
                score = 1.0;
            } else if (lowerMsg.includes(item.vraag) || item.vraag.includes(lowerMsg)) {
                score = 0.7;
            } else {
                const userWords = lowerMsg.split(/\s+/);
                const qWords = item.vraag.split(/\s+/);
                let matches = 0;
                for (let uw of userWords) {
                    for (let qw of qWords) {
                        if (uw === qw) matches++;
                    }
                }
                score = matches / Math.max(userWords.length, qWords.length) * 0.6;
            }
            
            if (score > bestScore) {
                bestScore = score;
                bestMatch = item;
            }
        }
        
        // Zoek in reacties.txt
        for (let item of qaDatabase) {
            let score = 0;
            if (lowerMsg === item.vraag) {
                score = 1.0;
            } else if (lowerMsg.includes(item.vraag) || item.vraag.includes(lowerMsg)) {
                score = 0.7;
            } else {
                const userWords = lowerMsg.split(/\s+/);
                const qWords = item.vraag.split(/\s+/);
                let matches = 0;
                for (let uw of userWords) {
                    for (let qw of qWords) {
                        if (uw === qw) matches++;
                    }
                }
                score = matches / Math.max(userWords.length, qWords.length) * 0.6;
            }
            
            if (score > bestScore) {
                bestScore = score;
                bestMatch = item;
            }
        }
        
        return { match: bestMatch, score: bestScore };
    }
    
    // ==================== LEER VAN CONVERSATIE ====================
    function learnFromConversation(botMessage, userResponse) {
        if (!botMessage || !userResponse) return false;
        
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = botMessage;
        const cleanBotMessage = tempDiv.textContent || tempDiv.innerText || botMessage;
        
        if (cleanBotMessage.length < 3 || userResponse.length < 1) return false;
        
        const lowerQuestion = cleanBotMessage.toLowerCase().trim();
        
        const existsInLearned = learnedQA.some(qa => qa.vraag === lowerQuestion);
        const existsInBase = qaDatabase.some(qa => qa.vraag === lowerQuestion);
        
        if (existsInLearned || existsInBase) return false;
        
        learnedQA.push({
            vraag: lowerQuestion,
            antwoord: userResponse,
            containsHtml: false,
            timestamp: new Date().toISOString(),
            bron: 'geleerd'
        });
        
        saveLearnedToStorage();
        
        console.log(`Stil geleerd: "${cleanBotMessage.substring(0, 40)}..." = "${userResponse.substring(0, 40)}..."`);
        
        return true;
    }
    
    // ==================== BESTE ANTWOORD KIEZEN ====================
    async function getBestResponse(userMessage) {
        const steps = [];
        
        // Stap 1: Zoek naar afbeelding in plaatjes.txt
        steps.push({ text: "Zoeken naar afbeelding in plaatjes.txt...", success: null });
        const imageMatch = findBestImageMatch(userMessage);
        
        if (imageMatch) {
            steps[steps.length - 1] = { text: `✓ Afbeelding gevonden: "${imageMatch.keyword}"`, success: true };
            
            const imageHtml = `
                <div>
                    <img src="${imageMatch.url}" class="generated-image" alt="${imageMatch.keyword}" loading="lazy" onclick="window.open('${imageMatch.url}', '_blank')">
                    <br>
                    <span style="font-size:0.7rem; opacity:0.7;">🖼️ ${imageMatch.keyword}</span>
                </div>
            `;
            return { 
                answer: imageHtml, 
                isHtml: true, 
                steps, 
                source: `afbeelding: ${imageMatch.keyword}`
            };
        } else {
            steps[steps.length - 1] = { text: "✗ Geen passende afbeelding gevonden in plaatjes.txt", success: false };
        }
        
        // Stap 2: Zoek in reacties.txt en geleerde QA
        steps.push({ text: "Zoeken in reacties en geleerde gesprekken...", success: null });
        const qaMatch = findBestQAMatch(userMessage);
        
        if (qaMatch.match && qaMatch.score >= 0.3) {
            steps[steps.length - 1] = { text: `✓ Antwoord gevonden (${Math.round(qaMatch.score * 100)}% match)`, success: true };
            return { 
                answer: qaMatch.match.antwoord, 
                isHtml: qaMatch.match.containsHtml || false, 
                steps, 
                source: qaMatch.match.bron || 'database'
            };
        } else {
            steps[steps.length - 1] = { text: "✗ Geen passend antwoord gevonden", success: false };
        }
        
        // Stap 3: Fallback antwoord
        steps.push({ text: "Genereren van standaard antwoord...", success: true });
        const fallbackAnswer = `Ik heb je vraag "${userMessage}" geanalyseerd. Helaas heb ik hier nog geen antwoord op. Kun je het anders vragen?`;
        return { answer: fallbackAnswer, isHtml: false, steps, source: 'generated' };
    }
    
    // ==================== UI FUNCTIES ====================
    function addUserMessage(text) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-user';
        wrapper.innerHTML = `
            <div class="user-avatar"><img src="mens.png" alt="Gebruiker" onerror="this.src='https://via.placeholder.com/40?text=U'"></div>
            <div class="bubble-user">${escapeHtml(text)}</div>
        `;
        messagesDiv.appendChild(wrapper);
        scrollToBottom();
    }
    
    function addBotMessage(text, isHtml = false) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-bot';
        wrapper.innerHTML = `
            <div class="bot-avatar"><img src="logo.png" alt="Nexi logo" onerror="this.src='https://via.placeholder.com/40?text=N'"></div>
            <div class="bubble-bot"></div>
        `;
        const bubble = wrapper.querySelector('.bubble-bot');
        if (isHtml) {
            bubble.innerHTML = text;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            lastBotMessage = tempDiv.textContent || tempDiv.innerText || text;
        } else {
            bubble.textContent = text;
            lastBotMessage = text;
        }
        messagesDiv.appendChild(wrapper);
        scrollToBottom();
    }
    
    function addAnalysisMessage(steps) {
        if (!analysisModeActive) return;
        const analysisDiv = document.createElement('div');
        analysisDiv.className = 'analysis-message';
        for (let step of steps) {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'analysis-step';
            const checkSpan = document.createElement('span');
            checkSpan.className = 'check';
            if (step.success === true) {
                checkSpan.classList.add('success');
                checkSpan.textContent = '✓';
            } else if (step.success === false) {
                checkSpan.classList.add('error');
                checkSpan.textContent = '✗';
            } else {
                checkSpan.classList.add('pending');
                checkSpan.textContent = '…';
            }
            const textSpan = document.createElement('span');
            textSpan.textContent = step.text;
            stepDiv.appendChild(checkSpan);
            stepDiv.appendChild(textSpan);
            analysisDiv.appendChild(stepDiv);
        }
        messagesDiv.appendChild(analysisDiv);
        scrollToBottom();
    }
    
    function showThinking() {
        const thinkDiv = document.createElement('div');
        thinkDiv.className = 'message-bot';
        thinkDiv.id = 'tempThinking';
        thinkDiv.innerHTML = `
            <div class="bot-avatar"><img src="logo.png" alt="Nexi logo" onerror="this.src='https://via.placeholder.com/40?text=N'"></div>
            <div class="bubble-bot thinking-bubble">Nexi zoekt het beste antwoord...</div>
        `;
        messagesDiv.appendChild(thinkDiv);
        scrollToBottom();
        return thinkDiv;
    }
    
    function removeThinking(element) {
        if (element && element.remove) element.remove();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 50);
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ==================== MODUS UI ====================
    function updateChips() {
        chipContainer.innerHTML = '';
        if (imageModeActive) {
            const chip = document.createElement('div');
            chip.className = 'mode-chip';
            chip.innerHTML = `Afbeeldingen zoeken <span class="remove">✕</span>`;
            chip.querySelector('.remove').addEventListener('click', () => {
                imageModeActive = false;
                updateChips();
                addBotMessage("Afbeeldingen-modus uitgeschakeld.", false);
            });
            chipContainer.appendChild(chip);
        }
        if (analysisModeActive) {
            const chip = document.createElement('div');
            chip.className = 'mode-chip';
            chip.innerHTML = `Analyse tonen <span class="remove">✕</span>`;
            chip.querySelector('.remove').addEventListener('click', () => {
                analysisModeActive = false;
                updateChips();
                addBotMessage("Analyse-modus uitgeschakeld.", false);
            });
            chipContainer.appendChild(chip);
        }
    }
    
    function toggleImageMode() {
        imageModeActive = !imageModeActive;
        updateChips();
        addBotMessage(imageModeActive ? "Afbeeldingen zoeken staat nu aan. Ik zoek in plaatjes.txt naar het beste resultaat bij je bericht." : "Afbeeldingen zoeken staat nu uit.", false);
        closePlusMenu();
    }
    
    function toggleAnalysisMode() {
        analysisModeActive = !analysisModeActive;
        updateChips();
        addBotMessage(analysisModeActive ? "Mijn analyse is nu zichtbaar." : "Mijn analyse is nu niet zichtbaar.", false);
        closePlusMenu();
    }
    
    // ==================== PLUS MENU ====================
    function openPlusMenu() {
        plusMenu.classList.add('open');
        currentPlusMenuOpen = true;
    }
    
    function closePlusMenu() {
        plusMenu.classList.remove('open');
        currentPlusMenuOpen = false;
    }
    
    function togglePlusMenu() {
        if (currentPlusMenuOpen) closePlusMenu();
        else openPlusMenu();
    }
    
    // ==================== HOOFD AFHANDELING ====================
    async function handleSend() {
        const message = messageInput.value.trim();
        if (message === "") return;
        
        addUserMessage(message);
        messageInput.value = "";
        
        if (lastBotMessage) {
            learnFromConversation(lastBotMessage, message);
        }
        
        const thinking = showThinking();
        
        setTimeout(async () => {
            removeThinking(thinking);
            const response = await getBestResponse(message);
            addBotMessage(response.answer, response.isHtml);
            if (response.steps && response.steps.length > 0) {
                addAnalysisMessage(response.steps);
            }
        }, 300);
    }
    
    // ==================== INITIALISATIE ====================
    async function init() {
        await Promise.all([loadReacties(), loadPlaatjes()]);
        loadLearnedFromStorage();
        updateChips();
        
        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        plusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlusMenu();
        });
        
        document.querySelectorAll('.menu-optie').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const action = opt.getAttribute('data-action');
                if (action === 'toggleImageMode') toggleImageMode();
                if (action === 'toggleAnalysisMode') toggleAnalysisMode();
                closePlusMenu();
            });
        });
        
        document.addEventListener('click', (event) => {
            if (!plusBtn.contains(event.target) && !plusMenu.contains(event.target)) {
                if (currentPlusMenuOpen) closePlusMenu();
            }
        });
        
        addBotMessage("Hey! Hoe is het ermee? Vraag me alles, ik ben hier om je te helpen. Als ik een afbeelding heb in plaatjes.txt, laat ik die zien! Probeer bijvoorbeeld 'brug', 'mens' of 'natuur'.", false);
    }
    
    init();
</script>
</body>
</html>
